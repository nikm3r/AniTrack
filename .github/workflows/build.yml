name: Build
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run build
      - run: npx electron-forge make
      - uses: softprops/action-gh-release@v1
        with:
          files: out/make/**/*

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel curl git
      - name: Create build user (makepkg refuses to run as root)
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
      - name: Build package
        run: |
          su builder -c "makepkg -si --noconfirm"
      - name: Upload pkg
        uses: softprops/action-gh-release@v1
        with:
          files: "*.pkg.tar.zst"

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run build
      - run: npx electron-forge make
      - uses: softprops/action-gh-release@v1
        with:
          files: out/make/**/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-rebuild -f -w better-sqlite3
      - run: npm run build
      - run: npx electron-forge make
      - uses: softprops/action-gh-release@v1
        with:
          files: out/make/**/*
